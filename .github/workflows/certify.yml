name: Certify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  repo-certification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python test dependencies
        run: python -m pip install --upgrade pip pytest jsonschema

      - name: Validate schemas
        run: python tests/validate_schemas.py

      - name: Certify fresh runtime
        run: python tests/run_token_system_regression.py

      - name: Install coordinator dependencies
        run: npm --prefix src/coordinator ci --ignore-scripts

      - name: Run coordinator test suite
        run: npm --prefix src/coordinator test
