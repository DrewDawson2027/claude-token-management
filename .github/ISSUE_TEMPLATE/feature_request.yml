name: Feature request
description: Propose a concrete improvement to prevention, measurement, or operator workflows.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What real workflow or operator pain does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: proof
    attributes:
      label: Why this should exist
      description: Link benchmarks, issues, or failure cases.
    validations:
      required: false
